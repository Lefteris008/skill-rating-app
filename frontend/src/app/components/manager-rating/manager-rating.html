<div class="manager-rating-container">
    <app-page-header [title]="'Rate Team Members'"></app-page-header>

    <p *ngIf="!employees || employees.length === 0" class="no-data-message">
        No team members to rate yet. Employees need to complete their self-assessments first.
    </p>

    <div *ngIf="employees && employees.length > 0">
        <p>Select a team member to rate:</p>
        <ul class="employee-list">
            <li *ngFor="let employee of employees" class="employee-item">
                <button (click)="selectEmployee(employee)" [class.rated]="isRated(employee.id)">
                    {{ employee.realName }}
                    <span *ngIf="isRated(employee.id)" class="rated-badge">✅ Rated</span>
                    <span *ngIf="!isRated(employee.id)" class="not-rated-badge">ℹ️ Not yet rated</span>
                </button>
                <button
                    *ngIf="isRated(employee.id)"
                    class="clear-btn"
                    title="Clear rating"
                    (click)="openClearConfirm(employee, $event)"
                >✕</button>
            </li>
        </ul>
    </div>

    <!-- Confirmation dialog -->
    <div *ngIf="confirmClearEmployee" class="confirm-overlay">
        <div class="confirm-dialog">
            <p class="confirm-message">
                You are going to clear your rating for
                <strong>{{ confirmClearEmployee.realName }}</strong>
                alongside their own rating. Are you sure you want to proceed?
            </p>
            <div class="confirm-actions">
                <button class="btn-cancel" (click)="cancelClear()">Cancel</button>
                <button class="btn-proceed" (click)="proceedClear()">Proceed</button>
            </div>
        </div>
    </div>
</div>
